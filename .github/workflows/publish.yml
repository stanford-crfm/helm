# This workflow publishes the medhelm package to PyPI when a release is created.
# Prerequisites:
#   1. Create project "medhelm" on PyPI (https://pypi.org/manage/account/ or org).
#   2. In PyPI: Add trusted publisher for this repo (Settings → Publishing → Add new publisher).
#      Use: Owner PacificAI, Repository medhelm, Workflow name publish.yml, Environment pypi.
#   3. In GitHub: Create environment "pypi" (Settings → Environments).
#   4. No secrets required; PyPI trusted publishing uses OIDC (id-token: write).

name: Publish Python package to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Publish medhelm to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/medhelm
    permissions:
      id-token: write
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.9.4"
    - name: Build
      run: uv build
    - name: Test medhelm-run (wheel)
      run: uv run --isolated --no-project --with dist/*.whl medhelm-run --run-entries simple1:model=simple/model1 --max-eval-instances 10 --suite test
    - name: Test helm-summarize (wheel)
      run: uv run --isolated --no-project --with dist/*.whl helm-summarize --suite test
    - name: Test helm-server (wheel)
      run: uv run --isolated --no-project --with dist/*.whl helm-server --help
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
