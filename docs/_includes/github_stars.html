<script>
(function() {
  var el = document.getElementById('github-stars-count');
  if (!el) return;
  fetch('https://api.github.com/repos/Pacific-AI-Corp/medhelm')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.stargazers_count != null) el.textContent = d.stargazers_count;
    })
    .catch(function() {});
})();
</script>
